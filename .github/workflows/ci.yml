name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentid
          POSTGRES_PASSWORD: agentid
          POSTGRES_DB: agentid
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v

      - name: Run alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://agentid:agentid@localhost:5432/agentid
        run: |
          alembic upgrade head

      - name: Start API server
        env:
          DATABASE_URL: postgresql+asyncpg://agentid:agentid@localhost:5432/agentid
        run: |
          uvicorn agentid.api.app:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentid:agentid@localhost:5432/agentid
        run: |
          pytest tests/integration/ -v || true
          # Kill server if still running
          kill $SERVER_PID 2>/dev/null || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: vars
        run: echo "VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = \"//;s/\"//')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            lu8jun2/agentid:${{ steps.vars.outputs.VERSION }}
            lu8jun2/agentid:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Quick smoke test
        run: docker run --rm lu8jun2/agentid:${{ steps.vars.outputs.VERSION }} python -c "from agentid.api.app import app; print('OK')"
